services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev_backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - /tmp/uploads:/tmp/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ev_frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"
